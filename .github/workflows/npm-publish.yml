name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - agents
          - loop
      dry_run:
        description: Run publish commands with --dry-run
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}-${{ inputs.package_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: NPM publish tests
        run: pnpm npm-publish:test

      - name: Dry-run publish
        if: ${{ inputs.dry_run }}
        run: pnpm npm-publish:dry-run -- --package ${{ inputs.package_name }}

      - name: Refuse non-main publish
        if: ${{ !inputs.dry_run && github.ref != 'refs/heads/main' }}
        run: |
          echo "Real npm publishing is only allowed from refs/heads/main. Current ref: ${{ github.ref }}"
          exit 1

      - name: Publish to npm
        if: ${{ !inputs.dry_run && github.ref == 'refs/heads/main' }}
        run: pnpm npm-publish:publish -- --package ${{ inputs.package_name }}

      - name: Upload release summary
        uses: actions/upload-artifact@v6
        with:
          name: release-summary
          path: release-summary.json
          if-no-files-found: ignore
